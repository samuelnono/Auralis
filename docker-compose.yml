services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: auralis-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: auralis-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend